site_name: pyedstem
site_description: Typed Python client for the Ed Stem API
site_url: https://alexdrbanana.github.io/pyedstem/
repo_url: https://github.com/AlexDrBanana/pyedstem
repo_name: AlexDrBanana/pyedstem

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - API reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            heading_level: 2
            show_root_heading: true
            show_source: false
            inherited_members: true

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - def_list
  - footnotes
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - tables